name: Web CI

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
        env:
          AUTH_SECRET: ci-test-secret-not-used-in-prod
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          FIREBASE_PROJECT_ID: placeholder
          FIREBASE_SERVICE_ACCOUNT_JSON: '{"type":"service_account"}'
          BACKEND_URL: http://localhost:8080
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
          NEXT_TELEMETRY_DISABLED: 1
